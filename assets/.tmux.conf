set-option -g mouse on
set-option -g prefix C-a
set-option -g focus-events on
unbind-key C-b
bind-key C-a send-prefix
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Monokai theme
set -g status-style "bg=#272822,fg=#f8f8f2"
set -g status-left-length 40
set -g status-left "#[bg=#a6e22e,fg=#272822,bold]  #S #[bg=#272822,fg=#a6e22e]"
set -g status-right "#[fg=#75715e]#[bg=#75715e,fg=#f8f8f2]  %H:%M #[fg=#f4bf75]#[bg=#f4bf75,fg=#272822,bold]  %d-%b "
set -g window-status-format "#[fg=#75715e]  #I:#W "
set -g window-status-current-format "#[fg=#272822,bg=#66d9ef]#[fg=#272822,bg=#66d9ef,bold]  #I:#W #[fg=#66d9ef,bg=#272822]"
set -g window-status-separator ""
set -g pane-border-style "fg=#75715e"
set -g pane-active-border-style "fg=#a6e22e"
set -g message-style "bg=#f4bf75,fg=#272822"

bind-key W choose-tree -w
