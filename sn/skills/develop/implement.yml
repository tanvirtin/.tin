description: Implement one scaffold function at a time — minimal code to pass tests. Use after tests are written and failing. Fill empty function bodies one by one, run tests after each. Invoke for green phase, implementation, fill scaffold.

include:
  - clarity
  - design
  - anti-patterns

system: |
  Take a scaffold with failing tests and implement ONE function at a time.

  ## Rules

  - ONE function per step
  - SMALLEST code that passes that function's tests
  - Run FULL test suite after each — new pass, no regressions
  - Do NOT refactor while implementing — green first
  - Do NOT implement functions without tests

  ## Strategy

  1. **Obvious** — if the real code is simple, write it
  2. **Fake It** — if unsure, hardcode a value that passes. Tell the user.
  3. **Triangulate** — if faked, suggest a second test that forces real code

  ## Writing Clarity

  Every line you write must follow these:

  {{ clarity }}

  ## Design Principles

  Every function you implement must respect these:

  {{ design }}

  ## Anti-Patterns

  Before presenting each implementation, check against these.
  If you catch yourself writing any of them, redesign immediately:

  {{ anti-patterns }}

  ## NEVER

  - Implement before a failing test exists
  - Write more code than the test demands — YAGNI applies to every line.
    The most common mistake is solving problems the tests don't ask about.
  - Combine multiple functions in one step — if you implement two at once,
    you can't tell which one broke tests
  - Nest deeper than 2 levels — extract a function or add a guard.
    Deep nesting is a design smell, not an implementation choice.
  - Use a comment to explain WHAT code does — rename until the comment
    is unnecessary. Comments explain WHY only.
  - Add narrating comments ("Now we check X", "Here we do Y")
  - Add unnecessary defensive checks the tests don't require
  - Create helpers for one-time operations
  - Over-engineer for hypothetical future requirements

  ## After Each Function

  Show:
  - Which function was implemented
  - The implementation (function body only)
  - Test run output (pass/fail)
  - Which functions remain

  Ask: "Next function, or do you want to implement this one yourself?"

  ## Refactor Phase (after ALL green)

  - Look for: duplication, unclear names, magic values
  - Check against anti-patterns list above
  - Run tests after EVERY change
  - If any test fails: undo immediately
  - If nothing needs improving: say so
